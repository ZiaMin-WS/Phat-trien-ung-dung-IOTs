<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - FPT Polytechnic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }
        .weather-card {
            background-color: #1e1e1e;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        .sub-card {
            background-color: #1e1e1e;
            border-radius: 1.25rem;
            padding: 1.25rem;
        }

        /* Hiệu ứng bóng đèn phát sáng */
        .bulb-glow {
            filter: drop-shadow(0 0 12px rgba(250, 204, 21, 0.7));
            transition: all 0.4s ease;
        }
        .bulb-off {
            filter: none;
            color: #4b5563; /* Xám tối */
            transition: all 0.4s ease;
        }

        /* Hiệu ứng bấm nút */
        button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="space-y-4 w-full max-w-sm p-4">
        <!-- KHỐI HIỂN THỊ NHIỆT ĐỘ CHÍNH -->
        <div class="weather-card flex justify-between items-center border border-white/5">
            <div class="flex flex-col">
                <span class="text-sm font-semibold text-blue-400 tracking-wider uppercase">FPT Polytechnic</span>
                <div class="flex items-start mt-1">
                    <span id="nhietDo" class="text-7xl font-light leading-none tracking-tighter">--°</span>
                </div>
                <div class="flex items-center mt-4 space-x-2 opacity-60">
                    <span class="text-[12px] font-medium">Cảm giác như 9°</span>
                </div>
            </div>
            
            <div class="relative w-24 h-24 flex items-center justify-end">
                <svg class="absolute top-1 right-5 w-10 h-10 text-blue-900/40" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="relative z-10 w-20 h-20 text-white" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.122,0.011-0.241,0.022-0.358C10.432,12.44,9,10.386,9,8c0-3.314,2.686-6,6-6 c2.551,0,4.726,1.594,5.586,3.843C21.18,5.321,21.821,5,22.5,5C24.433,5,26,6.567,26,8.5c0,1.558-1.02,2.878-2.433,3.336 C23.864,12.332,24,12.899,24,13.5C24,16.537,21.537,19,18.5,19H17.5z" transform="translate(-5, 2)"></path>
                </svg>
            </div>
        </div>

        <!-- KHỐI THÔNG SỐ PHỤ -->
        <div class="grid grid-cols-2 gap-3">
            <div class="sub-card flex items-center justify-between border border-white/5">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                    </svg>
                    <span class="text-xs font-semibold opacity-70">Độ ẩm</span>
                </div>
                <span id="doAm" class="text-sm font-bold">--%</span>
            </div>

            <div class="sub-card flex items-center justify-between border border-white/5">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12h10m4 0h3m-9-4h7m-9 8h5" />
                    </svg>
                    <span class="text-xs font-semibold opacity-70">Gió</span>
                </div>
                <span class="text-sm font-bold">3 km/h</span>
            </div>
        </div>

        <!-- HỆ THỐNG ĐIỀU KHIỂN ĐÈN -->
        <div class="sub-card border border-white/5 relative overflow-hidden">
            <div class="flex items-center space-x-3 mb-6">
                <div id="bulbContainer" class="p-2.5 bg-white/5 rounded-2xl transition-all duration-500">
                    <svg id="bulbIcon" class="w-6 h-6 bulb-off" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7zM9 21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1H9v1z"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold tracking-tight">Thiết bị chiếu sáng</span>
                    <span id="txtLightLabel" class="text-[10px] uppercase opacity-40 font-black tracking-widest">Ngoại tuyến</span>
                </div>
            </div>

            <!-- 1. Nút Công tắc tổng -->
            <button id="btnToggle" class="w-full bg-white/5 hover:bg-white/10 py-4 rounded-2xl mb-4 flex justify-between items-center px-5 group border border-white/5">
                <span class="text-xs font-bold text-gray-400 group-hover:text-white transition-colors">Công tắc tổng</span>
                <div id="toggleIndicator" class="w-12 h-6 bg-white/10 rounded-full relative transition-all duration-300">
                    <div id="toggleCircle" class="w-4.5 h-4.5 bg-white rounded-full absolute top-0.75 left-0.75 shadow-lg transition-all duration-300" style="height: 18px; width: 18px; top: 3px; left: 3px;"></div>
                </div>
            </button>

            <!-- 2. Cụm 2 nút điều khiển -->
            <div class="grid grid-cols-2 gap-3">
                <button id="btnOn" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-[11px] font-black tracking-[0.2em] transition-all uppercase shadow-lg shadow-blue-900/20 border border-blue-400/20">
                    Bật
                </button>
                <button id="btnOff" class="bg-white/5 hover:bg-white/10 py-4 rounded-2xl text-[11px] font-black tracking-[0.2em] transition-all uppercase text-gray-400 hover:text-white border border-white/5">
                    Tắt
                </button>
            </div>
        </div>
    </div>

    <!-- Era Widget SDK -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const tempElement = document.getElementById('nhietDo');
        const humiElement = document.getElementById('doAm');
        const bulbIcon = document.getElementById('bulbIcon');
        const bulbContainer = document.getElementById('bulbContainer');
        const txtLightLabel = document.getElementById('txtLightLabel');
        const btnToggle = document.getElementById('btnToggle');
        const toggleIndicator = document.getElementById('toggleIndicator');
        const toggleCircle = document.getElementById('toggleCircle');
        const btnOn = document.getElementById('btnOn');
        const btnOff = document.getElementById('btnOff');

        let configTemp = null, configHumi = null, configLight = null; 
        let currentLightValue = 0;

        const eraWidget = new EraWidget();
        
        eraWidget.init({
            eraOrigin: window.location.origin === "null" ? "*" : window.location.origin, 
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 5,
            onConfiguration: (configuration) => {
                if (configuration.realtime_configs && configuration.realtime_configs.length >= 3) {
                    configTemp = configuration.realtime_configs[0];
                    configHumi = configuration.realtime_configs[1];
                    configLight = configuration.realtime_configs[2];
                }
            },
            onValues: (values) => {
                if (configTemp && values[configTemp.id]) tempElement.innerHTML = values[configTemp.id].value + '°';
                if (configHumi && values[configHumi.id]) humiElement.innerHTML = values[configHumi.id].value + '%';
                if (configLight && values[configLight.id]) {
                    currentLightValue = values[configLight.id].value;
                    updateLightUI(currentLightValue);
                }
            },
        });

        function updateLightUI(value) {
            const isON = (value == 1);
            
            // Cập nhật biểu tượng bóng đèn phát sáng
            if (isON) {
                bulbIcon.className = "w-6 h-6 text-yellow-400 bulb-glow";
                bulbContainer.className = "p-2.5 bg-yellow-400/20 rounded-2xl transition-all duration-500 shadow-[0_0_15px_rgba(250,204,21,0.2)]";
                txtLightLabel.innerHTML = "Trực tuyến";
                txtLightLabel.className = "text-[10px] uppercase text-yellow-400 font-black tracking-widest";
                
                toggleIndicator.className = "w-12 h-6 bg-blue-600 rounded-full relative transition-all duration-300";
                toggleCircle.style.transform = "translateX(24px)";
                
                btnOn.className = "bg-blue-600 py-4 rounded-2xl text-[11px] font-black tracking-[0.2em] transition-all uppercase shadow-[0_0_20px_rgba(37,99,235,0.4)] border border-blue-400/40 scale-100";
                btnOff.className = "bg-white/5 hover:bg-white/10 py-4 rounded-2xl text-[11px] font-black tracking-[0.2em] transition-all uppercase text-gray-500 border border-white/5";
            } else {
                bulbIcon.className = "w-6 h-6 bulb-off";
                bulbContainer.className = "p-2.5 bg-white/5 rounded-2xl transition-all duration-500";
                txtLightLabel.innerHTML = "Ngoại tuyến";
                txtLightLabel.className = "text-[10px] uppercase opacity-40 font-black tracking-widest";
                
                toggleIndicator.className = "w-12 h-6 bg-white/10 rounded-full relative transition-all duration-300";
                toggleCircle.style.transform = "translateX(0px)";
                
                btnOn.className = "bg-white/5 hover:bg-blue-600/20 py-4 rounded-2xl text-[11px] font-black tracking-[0.2em] transition-all uppercase text-gray-500 border border-white/5";
                btnOff.className = "bg-white/10 py-4 rounded-2xl text-[11px] font-black tracking-[0.2em] transition-all uppercase text-white border border-white/20 shadow-lg";
            }
        }

        btnOn.onclick = () => configLight && eraWidget.triggerAction(configLight.id, 1);
        btnOff.onclick = () => configLight && eraWidget.triggerAction(configLight.id, 0);
        btnToggle.onclick = () => configLight && eraWidget.triggerAction(configLight.id, currentLightValue == 1 ? 0 : 1);
    </script>
</body>
</html>
