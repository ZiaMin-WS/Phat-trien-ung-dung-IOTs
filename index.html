<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Phát triển Ứng dụng IOTs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        /* Hiệu ứng nền */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }

        .weather-card {
            background-color: #1e1e1e;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
        }

        .sub-card {
            background-color: #1e1e1e;
            border-radius: 1.5rem;
            padding: 1.25rem;
        }

        /* Bulb Glow Animation - Màu vàng ấm áp */
        .bulb-glow {
            color: #fbbf24 !important; /* Amber 400 */
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.6));
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bulb-off {
            filter: none;
            color: #4b5563; /* Gray 600 */
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            -webkit-user-select: none;
        }

        /* Hiệu ứng nhấn giữ nút Bật (Xanh biển) */
        .btn-on-pressing {
            background-color: #3b82f6 !important; /* Blue 500 */
            color: white !important;
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
            border-color: rgba(255, 255, 255, 0.2) !important;
        }

        /* Hiệu ứng nhấn giữ nút Tắt (Đỏ) */
        .btn-off-pressing {
            background-color: #ef4444 !important; /* Red 500 */
            color: white !important;
            transform: scale(0.95);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            border-color: rgba(255, 255, 255, 0.2) !important;
        }

        /* Trạng thái gạt qua phải (Bật) */
        .toggle-active {
            transform: translateX(24px);
        }

        /* Trạng thái màu xanh khi gạt qua phải */
        .indicator-on {
            background-color: #3b82f6 !important; /* Blue 500 */
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        /* Trạng thái màu xám khi gạt qua trái */
        .indicator-off {
            background-color: rgba(255, 255, 255, 0.1) !important;
        }
    </style>
</head>
<body>

    <div class="glow" id="ambientGlow"></div>

    <div class="space-y-4 w-full max-w-[360px] p-4">
        
        <!-- Header -->
        <div class="flex justify-between items-center px-2">
            <div class="flex flex-col">
                <span class="text-[10px] font-black tracking-widest text-white/30 uppercase">Dashboard</span>
                <span class="text-sm font-bold text-white/90">Phát triển Ứng dụng IOTs</span>
            </div>
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>

        <!-- THẺ CHÍNH: THỜI TIẾT -->
        <div class="weather-card flex justify-between items-center border border-white/5 relative overflow-hidden">
            <div class="flex flex-col relative z-10">
                <span class="text-xs font-bold text-blue-400 tracking-wider">FPT Polytechnic</span>
                <div class="flex items-start mt-2">
                    <span id="nhietDo" class="text-7xl font-light leading-none tracking-tighter">--</span>
                    <span class="text-3xl font-light text-blue-400 mt-1">°</span>
                </div>
            </div>
            
            <div class="relative w-20 h-20 flex items-center justify-center">
                <svg class="absolute w-12 h-12 text-blue-500/10" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="relative z-10 w-16 h-16 text-white" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.122,0.011-0.241,0.022-0.358C10.432,12.44,9,10.386,9,8c0-3.314,2.686-6,6-6 c2.551,0,4.726,1.594,5.586,3.843C21.18,5.321,21.821,5,22.5,5C24.433,5,26,6.567,26,8.5c0,1.558-1.02,2.878-2.433,3.336 C23.864,12.332,24,12.899,24,13.5C24,16.537,21.537,19,18.5,19H17.5z" transform="translate(-5, 2)"></path>
                </svg>
            </div>
        </div>

        <!-- THẺ PHỤ -->
        <div class="grid grid-cols-2 gap-3">
            <div class="sub-card flex flex-col justify-between border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-30">Độ ẩm</span>
                <div class="flex items-baseline space-x-1 mt-2">
                    <span id="doAm" class="text-2xl font-bold">--</span>
                    <span class="text-sm font-medium text-white/30">%</span>
                </div>
            </div>

            <div class="sub-card flex flex-col justify-between border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-30">Gió</span>
                <div class="flex items-baseline space-x-1 mt-2">
                    <span class="text-2xl font-bold">3.2</span>
                    <span class="text-sm font-medium text-white/30">km/h</span>
                </div>
            </div>
        </div>

        <!-- ĐIỀU KHIỂN ĐÈN -->
        <div class="sub-card border border-white/5 bg-[#1a1a1a]">
            <div class="flex items-center space-x-4 mb-6">
                <div id="bulbContainer" class="p-3 bg-white/5 rounded-2xl transition-all duration-500">
                    <svg id="bulbIcon" class="w-7 h-7 bulb-off" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7zM9 21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1H9v1z"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span id="txtLightLabel" class="text-sm font-bold tracking-tight text-white/90">Hệ thống chiếu sáng</span>
                    <span class="text-[9px] uppercase opacity-40 font-black tracking-widest">Phòng Lab</span>
                </div>
            </div>

            <!-- Công tắc tổng (Toggle) -->
            <button id="btnToggle" class="w-full bg-white/5 hover:bg-white/10 py-5 rounded-2xl mb-4 flex justify-between items-center px-6 border border-white/5">
                <span class="text-xs font-bold text-gray-400">Công tắc tổng</span>
                <div id="toggleIndicator" class="w-12 h-6 indicator-off rounded-full relative transition-all duration-300">
                    <div id="toggleCircle" class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 shadow-md transition-all duration-300"></div>
                </div>
            </button>

            <!-- Nút nhấn Momentary -->
            <div class="grid grid-cols-2 gap-3">
                <button id="btnOn" class="bg-white/5 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">Bật</button>
                <button id="btnOff" class="bg-white/5 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">Tắt</button>
            </div>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const eraWidget = new EraWidget();
        let configTemp, configHumi, configLight;
        let currentLightValue = 0;

        eraWidget.init({
            eraOrigin: window.location.origin === "null" ? "*" : window.location.origin, 
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 5,
            onConfiguration: (c) => {
                configTemp = c.realtime_configs[0];
                configHumi = c.realtime_configs[1];
                configLight = c.realtime_configs[2];
            },
            onValues: (v) => {
                if (configTemp && v[configTemp.id]) document.getElementById('nhietDo').innerText = v[configTemp.id].value;
                if (configHumi && v[configHumi.id]) document.getElementById('doAm').innerText = v[configHumi.id].value;
                if (configLight && v[configLight.id]) {
                    currentLightValue = v[configLight.id].value;
                    updateUI(currentLightValue);
                }
            }
        });

        function updateUI(val) {
            const isON = (val == 1);
            const bulb = document.getElementById('bulbIcon');
            const cont = document.getElementById('bulbContainer');
            const circle = document.getElementById('toggleCircle');
            const indicator = document.getElementById('toggleIndicator');

            if (isON) {
                // Trạng thái bật
                bulb.className = "w-7 h-7 bulb-glow";
                cont.className = "p-3 bg-amber-400/10 rounded-2xl transition-all duration-500 border border-amber-400/20";
                
                // Toggle gạt sang phải và đổi màu xanh
                circle.classList.add('toggle-active');
                indicator.classList.remove('indicator-off');
                indicator.classList.add('indicator-on');
            } else {
                // Trạng thái tắt
                bulb.className = "w-7 h-7 bulb-off";
                cont.className = "p-3 bg-white/5 rounded-2xl transition-all duration-500 border border-transparent";
                
                // Toggle gạt sang trái và giữ màu xám mờ
                circle.classList.remove('toggle-active');
                indicator.classList.remove('indicator-on');
                indicator.classList.add('indicator-off');
            }
        }

        // Action: Công tắc tổng
        document.getElementById('btnToggle').onclick = () => {
            if (configLight) eraWidget.triggerAction(configLight.id, currentLightValue == 1 ? 0 : 1);
        };

        // Action: Nút nhấn giữ
        const setupHold = (id, val) => {
            const btn = document.getElementById(id);
            const activeClass = (val === 1) ? 'btn-on-pressing' : 'btn-off-pressing';
            
            const start = () => {
                if (configLight) eraWidget.triggerAction(configLight.id, val);
                btn.classList.add(activeClass);
            };
            const stop = () => btn.classList.remove(activeClass);

            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', stop);
            btn.addEventListener('mouseleave', stop);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
            btn.addEventListener('touchend', stop);
        };

        setupHold('btnOn', 1);
        setupHold('btnOff', 0);
    </script>
</body>
</html>
