<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home - Phát triển Ứng dụng IOTs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }

        .weather-card {
            background-color: #1e1e1e;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.6);
        }

        .sub-card {
            background-color: #1e1e1e;
            border-radius: 1.5rem;
            padding: 1.25rem;
        }

        .bulb-glow {
            color: #fbbf24 !important;
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.6));
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bulb-off {
            filter: none;
            color: #4b5563;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .toggle-active { transform: translateX(24px); }
        .indicator-on { background-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .indicator-off { background-color: rgba(255, 255, 255, 0.1) !important; }
    </style>
</head>
<body>

    <div class="glow" id="ambientGlow"></div>

    <div class="space-y-4 w-full max-w-[360px] p-4">
        <!-- Header -->
        <div class="flex justify-between items-center px-2">
            <div class="flex flex-col">
                <span class="text-[10px] font-black tracking-widest text-white/30 uppercase">Dashboard</span>
                <span class="text-sm font-bold text-white/90">Phát triển Ứng dụng IOTs</span>
            </div>
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        </div>

        <!-- THẺ CHÍNH: THỜI TIẾT -->
        <div class="weather-card flex justify-between items-center border border-white/5 relative overflow-hidden">
            <div class="flex flex-col relative z-10">
                <span class="text-xs font-bold text-blue-400 tracking-wider">FPT Polytechnic</span>
                <div class="flex items-start mt-2">
                    <span id="nhietDo" class="text-7xl font-light leading-none tracking-tighter">--</span>
                    <span class="text-3xl font-light text-blue-400 mt-1">°</span>
                </div>
            </div>
            <div class="relative w-20 h-20 flex items-center justify-center">
                <svg class="relative z-10 w-16 h-16 text-white" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.122,0.011-0.241,0.022-0.358C10.432,12.44,9,10.386,9,8c0-3.314,2.686-6,6-6 c2.551,0,4.726,1.594,5.586,3.843C21.18,5.321,21.821,5,22.5,5C24.433,5,26,6.567,26,8.5c0,1.558-1.02,2.878-2.433,3.336 C23.864,12.332,24,12.899,24,13.5C24,16.537,21.537,19,18.5,19H17.5z" transform="translate(-5, 2)"></path>
                </svg>
            </div>
        </div>

        <!-- THẺ PHỤ -->
        <div class="grid grid-cols-2 gap-3">
            <div class="sub-card flex flex-col justify-between border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-30">Độ ẩm</span>
                <div class="flex items-baseline space-x-1 mt-2">
                    <span id="doAm" class="text-2xl font-bold">--</span>
                    <span class="text-sm font-medium text-white/30">%</span>
                </div>
            </div>
            <div class="sub-card flex flex-col justify-between border border-white/5">
                <span class="text-[10px] font-black uppercase tracking-widest opacity-30">Status</span>
                <div class="mt-2">
                    <span id="statusLed" class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter">--</span>
                </div>
            </div>
        </div>

        <!-- ĐIỀU KHIỂN ĐÈN -->
        <div class="sub-card border border-white/5 bg-[#1a1a1a]">
            <div class="flex items-center space-x-4 mb-6">
                <div id="bulbContainer" class="p-3 bg-white/5 rounded-2xl transition-all duration-500">
                    <svg id="bulbIcon" class="w-7 h-7 bulb-off" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2a7 7 0 0 0-7 7c0 2.38 1.19 4.47 3 5.74V17a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.26c1.81-1.27 3-3.36 3-5.74a7 7 0 0 0-7-7zM9 21a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-1H9v1z"/>
                    </svg>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold tracking-tight text-white/90">Hệ thống chiếu sáng</span>
                    <span class="text-[9px] uppercase opacity-40 font-black tracking-widest">Phòng Lab</span>
                </div>
            </div>

            <button id="btnToggle" class="w-full bg-white/5 hover:bg-white/10 py-5 rounded-2xl mb-4 flex justify-between items-center px-6 border border-white/5">
                <span class="text-xs font-bold text-gray-400">Điều khiển nhanh</span>
                <div id="toggleIndicator" class="w-12 h-6 indicator-off rounded-full relative transition-all duration-300">
                    <div id="toggleCircle" class="w-4 h-4 bg-white rounded-full absolute top-1 left-1 shadow-md transition-all duration-300"></div>
                </div>
            </button>

            <div class="grid grid-cols-2 gap-3">
                <button id="turnOn" class="bg-blue-600/10 hover:bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-blue-600/20 transition-all">Bật đèn</button>
                <button id="turnOff" class="bg-white/5 hover:bg-red-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all">Tắt đèn</button>
            </div>
        </div>
    </div>

    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        // Các thành phần UI
        const tempDisp = document.getElementById('nhietDo');
        const humiDisp = document.getElementById('doAm');
        const statusLed = document.getElementById('statusLed');
        const turnOnBtn = document.getElementById('turnOn');
        const turnOffBtn = document.getElementById('turnOff');

        // Biến lưu cấu hình
        let configTemp = null, configHumi = null, configLed = null;
        let actions = [], currentLedValue = null;

        const eraWidget = new EraWidget();
        eraWidget.init({
            needRealtimeConfigs: true,
            needActions: true,
            maxRealtimeConfigsCount: 3,
            maxActionsCount: 2,
            
            onConfiguration: (configuration) => {
                // Thuật toán gán config từ code mới của bạn
                configTemp = configuration.realtime_configs[0];
                configHumi = configuration.realtime_configs[1];
                configLed = configuration.realtime_configs[2];
                actions = configuration.actions; 
            },

            onValues: (values) => {
                // Cập nhật Nhiệt độ & Độ ẩm
                if (configTemp && values[configTemp.id]) tempDisp.innerText = values[configTemp.id].value;
                if (configHumi && values[configHumi.id]) humiDisp.innerText = values[configHumi.id].value;
                
                // Cập nhật trạng thái đèn (LED)
                if (configLed && values[configLed.id]) {
                    const valueLed = values[configLed.id].value;
                    if (currentLedValue !== valueLed) {
                        currentLedValue = valueLed;
                        statusLed.innerHTML = (valueLed === 1) ? 'Đèn đang bật' : 'Đèn đang tắt';
                        updateUI(valueLed);
                    }
                }
            }
        });

        // Thuật toán kích hoạt hành động dựa trên danh sách actions nhận được
        turnOnBtn.addEventListener('click', () => {
            if (actions.length > 0) eraWidget.triggerAction(actions[0]?.action, null);
        });

        turnOffBtn.addEventListener('click', () => {
            if (actions.length > 1) eraWidget.triggerAction(actions[1]?.action, null);
        });

        // Toggle hỗ trợ đảo trạng thái dựa trên action khả dụng
        document.getElementById('btnToggle').onclick = () => {
            const actionToTrigger = (currentLedValue === 1) ? actions[1]?.action : actions[0]?.action;
            if (actionToTrigger) eraWidget.triggerAction(actionToTrigger, null);
        };

        function updateUI(val) {
            const isON = (val == 1);
            const bulb = document.getElementById('bulbIcon');
            const cont = document.getElementById('bulbContainer');
            const circle = document.getElementById('toggleCircle');
            const indicator = document.getElementById('toggleIndicator');

            if (isON) {
                bulb.className = "w-7 h-7 bulb-glow";
                cont.className = "p-3 bg-amber-400/10 rounded-2xl border border-amber-400/20";
                circle.classList.add('toggle-active');
                indicator.classList.replace('indicator-off', 'indicator-on');
            } else {
                bulb.className = "w-7 h-7 bulb-off";
                cont.className = "p-3 bg-white/5 rounded-2xl border border-transparent";
                circle.classList.remove('toggle-active');
                indicator.classList.replace('indicator-on', 'indicator-off');
            }
        }
    </script>
</body>
</html>
