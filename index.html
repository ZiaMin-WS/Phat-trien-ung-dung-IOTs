<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Widget - Era IoT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .weather-card {
            background-color: #2c2c2c;
            border-radius: 1.5rem;
            padding: 1.5rem;
            width: 100%;
            max-width: 400px;
        }
        .sub-card {
            background-color: #2c2c2c;
            border-radius: 1.25rem;
            padding: 1.25rem;
        }
    </style>
</head>
<body>

    <div class="space-y-4 w-full max-w-sm p-4">
        <!-- Thẻ chính: Nhiệt độ -->
        <div class="weather-card flex justify-between items-center text-white">
            <div class="flex flex-col">
                <span class="text-lg font-medium">FPT Polytechnic</span>
                <div class="flex items-start mt-1">
                    <!-- Gán ID để cập nhật nhiệt độ -->
                    <span id="nhietDo" class="text-7xl font-normal leading-none">--°</span>
                </div>
                <span class="text-sm opacity-70 mt-4 font-light text-[13px]">Nhiệt độ cảm nhận 9°</span>
            </div>
            
            <!-- Biểu tượng thời tiết -->
            <div class="relative w-24 h-24 flex items-center justify-end">
                <svg class="absolute top-1 right-5 w-10 h-10 text-[#1a3a6d]" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="relative z-10 w-20 h-20 text-white" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.122,0.011-0.241,0.022-0.358C10.432,12.44,9,10.386,9,8c0-3.314,2.686-6,6-6 c2.551,0,4.726,1.594,5.586,3.843C21.18,5.321,21.821,5,22.5,5C24.433,5,26,6.567,26,8.5c0,1.558-1.02,2.878-2.433,3.336 C23.864,12.332,24,12.899,24,13.5C24,16.537,21.537,19,18.5,19H17.5z" transform="translate(-5, 2)"></path>
                </svg>
            </div>
        </div>

        <!-- Các thẻ phụ -->
        <div class="grid grid-cols-2 gap-3 text-white">
            <!-- Độ ẩm -->
            <div class="sub-card flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-[#3b82f6]" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                    </svg>
                    <span class="text-sm font-medium">Độ ẩm</span>
                </div>
                <!-- Gán ID để cập nhật độ ẩm -->
                <span id="doAm" class="text-sm opacity-90">--%</span>
            </div>

            <!-- Tốc độ gió -->
            <div class="sub-card flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-white opacity-80" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12h10m4 0h3m-9-4h7m-9 8h5" />
                    </svg>
                    <span class="text-sm font-medium">Gió</span>
                </div>
                <span class="text-sm opacity-90 whitespace-nowrap">3 km/h</span>
            </div>
        </div>
    </div>

    <!-- Tích hợp Era Widget SDK -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        const tempElement = document.getElementById('nhietDo');
        const humiElement = document.getElementById('doAm');

        let configTemp = null;
        let configHumi = null;

        const eraWidget = new EraWidget();
        eraWidget.init({
            eraOrigin: "*", // Fix lỗi Invalid eraOrigin bằng cách cho phép nhận tin nhắn từ mọi nguồn hoặc domain Era
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 3,
            onConfiguration: (configuration) => {
                // Cấu hình 0 cho Nhiệt độ, 1 cho Độ ẩm
                configTemp = configuration.realtime_configs[0];
                configHumi = configuration.realtime_configs[1];
            },
            onValues: (values) => {
                // Cập nhật Nhiệt độ
                if (configTemp && values[configTemp.id]) {
                    const valueTemp = values[configTemp.id].value;
                    tempElement.innerHTML = valueTemp + '°';
                }

                // Cập nhật Độ ẩm
                if (configHumi && values[configHumi.id]) {
                    const valueHumi = values[configHumi.id].value;
                    humiElement.innerHTML = valueHumi + '%';
                }
            },
        });
    </script>
</body>
</html>
